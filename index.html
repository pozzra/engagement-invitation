<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ពិធីភ្ជាប់ពាក្យ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;500&family=Battambang:wght@400;700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="https://imgs.search.brave.com/sOKrDRbO8p9YUXqlnKNbvFQVJGDZEO2BzHG8mMv_S5Q/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly9tZWRp/YS5pc3RvY2twaG90/by5jb20vaWQvMjE2/OTgxMjc2OS9waG90/by9tYW4tYW5kLXdv/bWFuLWhvbGRpbmct/aGFuZHMtd2l0aC1l/bmdhZ2VtZW50LXJp/bmcud2VicD9hPTEm/Yj0xJnM9NjEyeDYx/MiZ3PTAmaz0yMCZj/PTZCM2JzeTI1OE9G/OHJfRFZtYml2MjBq/SWpMaC1RSXBGNktN/eWtZbkxFeFU9" type="image/x-icon">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f8e8f0 0%, #fce4ec 30%, #e8d5f5 70%, #dce8f8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        #scaler {
            width: 750px;
            height: 480px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .card {
            width: 750px;
            height: 480px;
            background: linear-gradient(145deg, #fff9fd 0%, #fef0fa 40%, #f5eeff 70%, #eef3ff 100%);
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(180,120,200,0.3), 0 10px 30px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            padding: 35px 50px;
            opacity: 0;
            transform: scale(0.9);
            animation: cardEntrance 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cardEntrance {
            to { opacity: 1; transform: scale(1); }
        }

        /* --- New Modern Couple Style --- */
        .couple-wrap {
            position: absolute; 
            right: 40px; 
            bottom: 40px;
            width: 200px; 
            height: 220px;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUpFade 1.2s ease 0.8s forwards;
            z-index: 1;
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Content & Text --- */
        .animate-in {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .delay-1 { animation-delay: 0.3s; }
        .delay-2 { animation-delay: 0.5s; }
        .delay-3 { animation-delay: 0.7s; }
        .delay-4 { animation-delay: 0.9s; }

        .content { position: relative; z-index: 2; width: calc(100% - 220px); }

        .title-km {
            font-family: 'Battambang', serif; font-size: 28px; font-weight: bold;
            background: linear-gradient(135deg,#d4a017 0%,#f0c040 40%,#c8860a 70%,#e8b020 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 4px; filter: drop-shadow(0 2px 4px rgba(180,130,0,.2));
        }

        .title-en {
            font-family: 'Cormorant Garamond', serif; font-size: 13px; font-weight: 500;
            letter-spacing: 4px; color: #a07828; margin-bottom: 15px;
            display: flex; align-items: center; gap: 8px;
        }
        .title-en::before, .title-en::after { content:'❧'; color:#d4a017; }

        .names {
            font-family: 'Battambang', serif; font-size: 34px; font-weight: bold;
            color: #c8860a; line-height: 1.2; margin-bottom: 8px;
        }
        .heart { color:#e05080; display: inline-block; animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }

        .sub-title { font-family: 'Battambang', serif; font-size: 16px; color: #8860a0; margin-bottom: 15px; }

        .gold-box {
            border: 2px solid #d4a017; border-radius: 8px;
            background: rgba(255,245,200,.4); width: 260px; height: 32px; 
            margin-bottom: 15px; position: relative;
        }

        .separator {
            width: 100%; height: 1px;
            background: linear-gradient(to right,transparent,#d4a017,#f0c040,#d4a017,transparent);
            margin-bottom: 15px; opacity: 0.6;
        }

        .details { font-family: 'Battambang', serif; font-size: 13px; color: #5a4070; line-height: 1.8; }
        .detail-highlight { color:#a06820; font-weight:bold; }

        .qr-section { margin-top: 15px; display: flex; align-items: center; gap: 12px; }
        .qr-code {
            width: 70px; height: 70px; padding: 5px; background: white;
            border: 1px solid #d4a017; border-radius: 8px;
        }
        .qr-text { font-family: 'Battambang', serif; font-size: 11px; color: #a07828; }
    </style>
</head>
<body>

<div id="scaler">
    <div class="card">
        <div class="content">
            <div class="title-km animate-in delay-1">សិរីសួស្តីពិធីភ្ជាប់ពាក្យ</div>
            <div class="title-en animate-in delay-1">ENGAGEMENT INVITATION</div>

            <div class="names animate-in delay-2">
                គន់ អមរ៉ា <span class="heart">♥</span> ម៉េង ឆៃលាង
            </div>

            <div class="sub-title animate-in delay-2">សូមគោរពអញ្ជើញ</div>

            <div class="gold-box animate-in delay-3"></div>
            <div class="separator animate-in delay-3"></div>

            <div class="details animate-in delay-4">
                <div class="detail-row">✦ <span class="detail-highlight">ថ្ងៃអាទិត្យ ទី០៣ ខែឧសភា ឆ្នាំ២០២៦</span></div>
                <div class="detail-row">&nbsp;&nbsp;&nbsp;ចាប់ផ្តើម <span class="detail-highlight">ម៉ោង ០៤:០០ រសៀល</span></div>
                <div style="margin-top: 5px;">✦ ស្ថិតនៅគេហដ្ឋានខាងស្រី ភូមិ ភូមិចុង ឃុំ សំបូរ<br>&nbsp;&nbsp;&nbsp;ស្រុក បាធាយ ខេត្ត កំពង់ចាម</div>
            </div>

            <div class="qr-section animate-in delay-4">
                <img class="qr-code" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://www.google.com/maps/search/?api=1%26query=11.889177,104.913223" alt="QR Code">
                <div class="qr-text"><strong>ស្កេនដើម្បីមើលទីតាំង</strong><br>Scan for Google Maps</div>
            </div>
        </div>

        <div class="couple-wrap">
            <svg viewBox="0 0 200 220" fill="none" xmlns="http://www.w3.org/2000/svg">
                <g transform="translate(40, 20)">
                    <rect x="15" y="80" width="45" height="100" rx="12" fill="#2D3E50"/> <path d="M15 100 L37 80 L60 100" stroke="white" stroke-width="2" fill="none"/> <circle cx="37.5" cy="45" r="22" fill="#FFDBAC"/> <path d="M15 45 Q15 20 37.5 20 Q60 20 60 45" fill="#3D2B1F"/> <rect x="25" y="180" width="12" height="15" fill="#1A1A1A"/> <rect x="40" y="180" width="12" height="15" fill="#1A1A1A"/> </g>
                <g transform="translate(95, 25)">
                    <path d="M10 180 L35 70 L60 180 Z" fill="#F8F0FF" stroke="#E0D0F0" stroke-width="1"/> <path d="M10 180 Q35 195 60 180" fill="#F8F0FF"/> <circle cx="35" cy="40" r="20" fill="#FFE4C4"/> <path d="M10 40 Q10 10 35 10 Q60 10 60 40" fill="#4B3621"/> <path d="M15 110 Q35 125 55 110" stroke="#D0B0F0" stroke-width="2" fill="none"/> <path d="M15 30 Q35 0 55 30 L65 100 Q35 115 5 100 Z" fill="white" opacity="0.3"/>
                </g>
                <g transform="translate(85, 120)">
                    <circle cx="5" cy="5" r="6" fill="#FFB7C5"/>
                    <circle cx="12" cy="0" r="5" fill="#FFC0CB"/>
                    <circle cx="0" cy="-2" r="5" fill="#F4C2C2"/>
                    <rect x="4" y="8" width="3" height="15" fill="#77DD77" transform="rotate(10)"/>
                </g>
            </svg>
        </div>
    </div>
</div>

<script>
    function scaleCard() {
        const scaler = document.getElementById('scaler');
        const availableWidth = window.innerWidth - 40;
        const availableHeight = window.innerHeight - 40;
        const scale = Math.min(1, availableWidth / 750, availableHeight / 480);
        scaler.style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', scaleCard);
    window.addEventListener('load', scaleCard);
    scaleCard();
</script>

</body>
</html>
